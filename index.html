<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Змагання команд</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f4f8; }
        .container { display: flex; gap: 20px; margin-top: 20px; }
        .team-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        .hidden { display: none; }
        .btn { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #resultsBoard { margin-top: 30px; padding: 20px; background: #fff; border: 2px solid #333; width: 60%; }
    </style>
</head>
<body>

    <h1>Квест "Код природи"</h1>
    
    <div class="container" id="gameArea">
        <!-- Генерація 3х зон -->
        <script>
            for(let i=1; i<=3; i++) {
                document.write(`
                    <div class="team-box" id="team${i}">
                        <h3>Команда ${i}</h3>
                        <input type="text" id="name${i}" placeholder="Введіть назву команди">
                        <button class="btn" onclick="startTimer(${i})">Розпочати</button>
                        <div id="quest${i}" class="hidden">
                            <p>1. Земля - це третя планета від Сонця? (так/ні)</p><input type="text" data-ans="так">
                            <p>2. Чи є Земля єдиною відомою планетою з життям? (так/ні)</p><input type="text" data-ans="так">
                            <p>3. Скільки океанів на Землі? (цифра)</p><input type="text" data-ans="4">
                            <button class="btn" onclick="finishTeam(${i})">Фініш</button>
                        </div>
                    </div>
                `);
            }
        </script>
    </div>

    <button class="btn" style="margin-top:20px; background:green;" onclick="showFinalResults()">Підбити підсумки</button>

    <div id="resultsBoard" class="hidden">
        <h2>П'єдестал переможців</h2>
        <div id="leaderboard"></div>
    </div>

    <script>
        let startTime = {};
        let finalResults = [];

        function startTimer(id) {
            let name = document.getElementById(`name${id}`).value;
            if(!name) return alert("Введіть назву команди!");
            startTime[id] = Date.now();
            document.getElementById(`quest${id}`).classList.remove('hidden');
        }

        function finishTeam(id) {
            let endTime = Date.now();
            let duration = (endTime - startTime[id]) / 1000;
            let inputs = document.querySelectorAll(`#team${id} input[type="text"][data-ans]`);
            let score = 0;
            inputs.forEach(inp => {
                if(inp.value.trim().toLowerCase() === inp.dataset.ans.toLowerCase()) score++;
            });
            
            finalResults.push({
                name: document.getElementById(`name${id}`).value,
                score: score,
                time: duration
            });
            document.getElementById(`team${id}`).innerHTML = `<h3>${document.getElementById(`name${id}`).value}</h3><p>Завершено!</p>`;
        }

        function showFinalResults() {
            // Сортування: спочатку за балами (більше краще), потім за часом (менше краще)
            finalResults.sort((a, b) => b.score - a.score || a.time - b.time);
            
            let html = "<ol>";
            finalResults.forEach((res, index) => {
                html += `<li><strong>${index+1} місце:</strong> ${res.name} — ${res.score} балів, час: ${res.time.toFixed(1)} сек</li>`;
            });
            html += "</ol>";
            
            document.getElementById('leaderboard').innerHTML = html;
            document.getElementById('resultsBoard').classList.remove('hidden');
        }
    </script>
</body>
</html>
