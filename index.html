<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій літній метеожурнал</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header class="app-header">
        <h1>☀️ Мій літній метеожурнал</h1>
        <p>Щоденник юного синоптика</p>
    </header>

    <main class="app-content" id="app-main">
        
        <section id="tab-today" class="tab-section active">
            <div class="card">
                <h2>Яка погода сьогодні?</h2>
                <p class="date-display" id="current-date">20 травня, Середа</p>
                
                <div class="weather-selector">
                    <button class="weather-btn" data-weather="sunny">
                        <span class="emoji">☀️</span>
                        <span>Спека</span>
                    </button>
                    <button class="weather-btn" data-weather="rainy">
                        <span class="emoji">🌧️</span>
                        <span>Злива</span>
                    </button>
                    <button class="weather-btn" data-weather="cloudy">
                        <span class="emoji">⛅</span>
                        <span>Хмарно</span>
                    </button>
                    <button class="weather-btn" data-weather="rainbow">
                        <span class="emoji">🌈</span>
                        <span>Веселка</span>
                    </button>
                </div>

                <div class="temperature-input">
                    <label for="temp-range">Температура повітря: <span id="temp-val">+22</span>°C</label>
                    <div class="stepper">
                        <button type="button" onclick="changeTemp(-1)">-</button>
                        <input type="range" id="temp-range" min="-10" max="45" value="22" oninput="updateTemp(this.value)">
                        <button type="button" onclick="changeTemp(1)">+</button>
                    </div>
                </div>

                <button class="btn-save" onclick="saveWeatherData()">Зберегти у журнал 📝</button>
            </div>
        </section>

        <section id="tab-analytics" class="tab-section">
            <div class="card">
                <h2>Кліматична аналітика літа</h2>
                <div class="chart-container">
                    <svg class="donut-chart" viewBox="0 0 42 42">
                        <circle class="donut-hole" cx="21" cy="21" r="15.915" fill="#fff"></circle>
                        <circle class="donut-ring" cx="21" cy="21" r="15.915" fill="transparent" stroke="#e0e0e0" stroke-width="3"></circle>
                        <circle id="segment-sunny" cx="21" cy="21" r="15.915" fill="transparent" stroke="#ffca28" stroke-width="5" stroke-dasharray="70 30" stroke-dashoffset="25"></circle>
                        <circle id="segment-rainy" cx="21" cy="21" r="15.915" fill="transparent" stroke="#42a5f5" stroke-width="5" stroke-dasharray="30 70" stroke-dashoffset="55"></circle>
                    </svg>
                </div>
                
                <div class="records-list">
                    <div class="record-item">🏆 <strong>Найспекотніший день:</strong> <span id="rec-hot">-</span></div>
                    <div class="record-item">⛈️ <strong>Найбільша злива:</strong> <span id="rec-rain">-</span></div>
                </div>
            </div>
        </section>

    </main>

    <nav class="app-navigation">
        <button class="nav-btn active" onclick="switchTab('tab-today')">
            <span class="nav-icon">✏️</span>
            <span class="nav-text">Сьогодні</span>
        </button>
        <button class="nav-btn" onclick="switchTab('tab-analytics')">
            <span class="nav-icon">📊</span>
            <span class="nav-text">Аналітика</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
